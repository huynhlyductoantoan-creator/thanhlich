<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>WEIRD Monster - Học Tập Động Học Ngược</title>
  <!-- Nhúng Tone.js cho hiệu ứng âm thanh thời gian thực chuyên nghiệp -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    /* Bảng thông tin câu hỏi phong cách Neon tối giản */
    #quiz-container {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.75);
      padding: 20px 35px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    #question {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-shadow: 0px 0px 12px #00ffcc;
      color: #00ffcc;
    }

    #stats-row {
      display: flex;
      justify-content: space-around;
      gap: 25px;
      font-size: 16px;
      font-weight: 500;
      color: #ccc;
    }

    #score {
      color: #ffd700;
      text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
    }

    #lives {
      color: #ff4a4a;
    }

    /* Thanh thời gian Neon đếm ngược */
    #timer-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
      position: relative;
    }

    #timer-bar {
      width: 100%;
      height: 100%;
      background: #00ffcc;
      transition: width 0.1s linear;
      box-shadow: 0 0 8px #00ffcc;
    }

    /* Nút Âm Thanh Góc Phải */
    #audio-btn {
      position: absolute;
      top: 25px;
      right: 25px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.65);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    #audio-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Màn hình kết thúc trò chơi */
    #game-over-screen {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      backdrop-filter: blur(8px);
    }

    #game-over-screen h1 {
      font-size: 56px;
      color: #ff3333;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      font-weight: 800;
      letter-spacing: 2px;
    }

    #final-score {
      font-size: 26px;
      margin-bottom: 35px;
      color: #eee;
    }

    #restart-btn {
      padding: 14px 40px;
      font-size: 22px;
      font-weight: bold;
      background: #00ffcc;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: black;
      box-shadow: 0 0 25px #00ffcc;
      transition: all 0.2s ease;
    }

    #restart-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px #00ffcc;
    }

    #restart-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <!-- Nút Bật/Tắt Âm Thanh do chính sách tương tác của trình duyệt -->
  <button id="audio-btn" onclick="toggleAudio()">🔇 Nhạc: Tắt</button>

  <div id="quiz-container">
    <div id="question">Đang tải...</div>
    <div id="stats-row">
      <div id="score">Điểm số: 0</div>
      <div id="lives">Mạng: ❤️❤️❤️</div>
    </div>
    <!-- Thanh tiến trình thời gian -->
    <div id="timer-bar-container">
      <div id="timer-bar"></div>
    </div>
  </div>

  <div id="game-over-screen">
    <h1>TRÒ CHƠI KẾT THÚC</h1>
    <p id="final-score">Điểm của bạn: 0</p>
    <button id="restart-btn" onclick="resetGame()">Chơi lại</button>
  </div>

  <script>
    var Input = {
      keys: [],
      mouse: {
        left: false,
        right: false,
        middle: false,
        x: window.innerWidth / 2,
        y: window.innerHeight / 2
      }
    };
    for (var i = 0; i < 230; i++) {
      Input.keys.push(false);
    }
    document.addEventListener("keydown", function(event) {
      Input.keys[event.keyCode] = true;
    });
    document.addEventListener("keyup", function(event) {
      Input.keys[event.keyCode] = false;
    });
    document.addEventListener("mousedown", function(event) {
      if (event.button == 0) {
        Input.mouse.left = true;
      }
      if (event.button == 1) {
        Input.mouse.middle = true;
      }
      if (event.button == 2) {
        Input.mouse.right = true;
      }
    });
    document.addEventListener("mouseup", function(event) {
      if (event.button == 0) {
        Input.mouse.left = false;
      }
      if (event.button == 1) {
        Input.mouse.middle = false;
      }
      if (event.button == 2) {
        Input.mouse.right = false;
      }
    });
    document.addEventListener("mousemove", function(event) {
      Input.mouse.x = event.clientX;
      Input.mouse.y = event.clientY;
    });
    
    // Khởi tạo Canvas chuẩn
    var canvas = document.createElement("canvas");
    document.body.appendChild(canvas);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.position = "absolute";
    canvas.style.left = "0px";
    canvas.style.top = "0px";
    
    window.addEventListener("resize", function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    var ctx = canvas.getContext("2d");

    var bgmSynth, sfxSynth;
    var audioEnabled = false;
    var bgmLoopId = null;
    var bgmStep = 0;
    // Giai điệu nhạc nền uốn lượn dễ thương hợp với chuyển động của Quái Vật
    var bgmNotes = ["C3", "E3", "G3", "A3", "C4", "A3", "G3", "E3", "D3", "F3", "A3", "C4", "D4", "C4", "A3", "F3"];

    function initAudio() {
      if (bgmSynth) return;

      // Nhạc nền êm ái uốn lượn, âm lượng nhỏ
      bgmSynth = new Tone.MonoSynth({
        oscillator: { type: "triangle" },
        envelope: { attack: 0.1, decay: 0.2, sustain: 0.7, release: 0.8 },
        filter: { Q: 1, type: "lowpass", frequency: 1000 }
      }).toDestination();
      bgmSynth.volume.value = -16;

      // Synth phát hiệu ứng sfx sắc nét
      sfxSynth = new Tone.Synth({
        oscillator: { type: "sine" },
        envelope: { attack: 0.01, decay: 0.15, sustain: 0, release: 0.15 }
      }).toDestination();
      sfxSynth.volume.value = -4;
    }

    function toggleAudio() {
      Tone.start();
      audioEnabled = !audioEnabled;
      var btn = document.getElementById("audio-btn");
      if (audioEnabled) {
        initAudio();
        btn.innerText = "🔊 Nhạc: Bật";
        btn.style.boxShadow = "0 0 15px #00ffcc";
        btn.style.color = "#00ffcc";
        startBGM();
      } else {
        btn.innerText = "🔇 Nhạc: Tắt";
        btn.style.boxShadow = "none";
        btn.style.color = "#ccc";
        stopBGM();
      }
    }

    function startBGM() {
      if (bgmLoopId) clearInterval(bgmLoopId);
      bgmLoopId = setInterval(function() {
        if (!audioEnabled || !bgmSynth) return;
        var note = bgmNotes[bgmStep % bgmNotes.length];
        bgmSynth.triggerAttackRelease(note, "8n");
        bgmStep++;
      }, 350); 
    }

    function stopBGM() {
      if (bgmLoopId) {
        clearInterval(bgmLoopId);
        bgmLoopId = null;
      }
    }

    function playCorrectSFX() {
      if (!audioEnabled || !sfxSynth) return;
      var now = Tone.now();
      sfxSynth.triggerAttackRelease("C5", "16n", now);
      sfxSynth.triggerAttackRelease("E5", "16n", now + 0.08);
      sfxSynth.triggerAttackRelease("G5", "8n", now + 0.16);
    }

    function playIncorrectSFX() {
      if (!audioEnabled || !sfxSynth) return;
      var now = Tone.now();
      sfxSynth.triggerAttackRelease("A3", "8n", now);
      sfxSynth.triggerAttackRelease("D#3", "8n", now + 0.12);
    }

    function playGameOverSFX() {
      if (!audioEnabled || !sfxSynth) return;
      var now = Tone.now();
      sfxSynth.triggerAttackRelease("G3", "8n", now);
      sfxSynth.triggerAttackRelease("E3", "8n", now + 0.15);
      sfxSynth.triggerAttackRelease("C3", "4n", now + 0.3);
    }

    var segmentCount = 0;
    class Segment {
      constructor(parent, size, angle, range, stiffness) {
        segmentCount++;
        this.isSegment = true;
        this.parent = parent; 
        if (typeof parent.children == "object") {
          parent.children.push(this);
        }
        this.children = []; 
        this.size = size; 
        this.relAngle = angle; 
        this.defAngle = angle; 
        this.absAngle = parent.absAngle + angle; 
        this.range = range; 
        this.stiffness = stiffness; 
        this.updateRelative(false, true);
      }
      updateRelative(iter, flex) {
        this.relAngle =
          this.relAngle -
          2 *
          Math.PI *
          Math.floor((this.relAngle - this.defAngle) / 2 / Math.PI + 1 / 2);
        if (flex) {
          this.relAngle = Math.min(
            this.defAngle + this.range / 2,
            Math.max(
              this.defAngle - this.range / 2,
              (this.relAngle - this.defAngle) / this.stiffness + this.defAngle
            )
          );
        }
        this.absAngle = this.parent.absAngle + this.relAngle;
        this.x = this.parent.x + Math.cos(this.absAngle) * this.size; 
        this.y = this.parent.y + Math.sin(this.absAngle) * this.size; 
        if (iter) {
          for (var i = 0; i < this.children.length; i++) {
            this.children[i].updateRelative(iter, flex);
          }
        }
      }
      draw(iter) {
        ctx.beginPath();
        ctx.moveTo(this.parent.x, this.parent.y);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
        if (iter) {
          for (var i = 0; i < this.children.length; i++) {
            this.children[i].draw(true);
          }
        }
      }
      follow(iter) {
        var x = this.parent.x;
        var y = this.parent.y;
        var dist = ((this.x - x) ** 2 + (this.y - y) ** 2) ** 0.5;
        this.x = x + this.size * (this.x - x) / dist;
        this.y = y + this.size * (this.y - y) / dist;
        this.absAngle = Math.atan2(this.y - y, this.x - x);
        this.relAngle = this.absAngle - this.parent.absAngle;
        this.updateRelative(false, true);
        if (iter) {
          for (var i = 0; i < this.children.length; i++) {
            this.children[i].follow(true);
          }
        }
      }
    }

    class LimbSystem {
      constructor(end, length, speed, creature) {
        this.end = end;
        this.length = Math.max(1, length);
        this.creature = creature;
        this.speed = speed;
        creature.systems.push(this);
        this.nodes = [];
        var node = end;
        for (var i = 0; i < length; i++) {
          this.nodes.unshift(node);
          node = node.parent;
          if (!node.isSegment) {
            this.length = i + 1;
            break;
          }
        }
        this.hip = this.nodes[0].parent;
      }
      moveTo(x, y) {
        this.nodes[0].updateRelative(true, true);
        var dist = ((x - this.end.x) ** 2 + (y - this.end.y) ** 2) ** 0.5;
        var len = Math.max(0, dist - this.speed);
        for (var i = this.nodes.length - 1; i >= 0; i--) {
          var node = this.nodes[i];
          var ang = Math.atan2(node.y - y, node.x - x);
          node.x = x + len * Math.cos(ang);
          node.y = y + len * Math.sin(ang);
          x = node.x;
          y = node.y;
          len = node.size;
        }
        for (var i = 0; i < this.nodes.length; i++) {
          var node = this.nodes[i];
          node.absAngle = Math.atan2(
            node.y - node.parent.y,
            node.x - node.parent.x
          );
          node.relAngle = node.absAngle - node.parent.absAngle;
          for (var ii = 0; ii < node.children.length; ii++) {
            var childNode = node.children[ii];
            if (!this.nodes.includes(childNode)) {
              childNode.updateRelative(true, false);
            }
          }
        }
      }
      update() {
        this.moveTo(Input.mouse.x, Input.mouse.y);
      }
    }

    class LegSystem extends LimbSystem {
      constructor(end, length, speed, creature) {
        super(end, length, speed, creature);
        this.goalX = end.x;
        this.goalY = end.y;
        this.step = 0; 
        this.forwardness = 0;
        this.reach =
          0.9 *
          ((this.end.x - this.hip.x) ** 2 + (this.end.y - this.hip.y) ** 2) ** 0.5;
        var relAngle =
          this.creature.absAngle -
          Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x);
        relAngle -= 2 * Math.PI * Math.floor(relAngle / 2 / Math.PI + 1 / 2);
        this.swing = -relAngle + (2 * (relAngle < 0) - 1) * Math.PI / 2;
        this.swingOffset = this.creature.absAngle - this.hip.absAngle;
      }
      update(x, y) {
        this.moveTo(this.goalX, this.goalY);
        if (this.step == 0) {
          var dist =
            ((this.end.x - this.goalX) ** 2 + (this.end.y - this.goalY) ** 2) **
            0.5;
          if (dist > 1) {
            this.step = 1;
            this.goalX =
              this.hip.x +
              this.reach *
                Math.cos(this.swing + this.hip.absAngle + this.swingOffset) +
              (2 * Math.random() - 1) * this.reach / 2;
            this.goalY =
              this.hip.y +
              this.reach *
                Math.sin(this.swing + this.hip.absAngle + this.swingOffset) +
              (2 * Math.random() - 1) * this.reach / 2;
          }
        } else if (this.step == 1) {
          var theta =
            Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x) -
            this.hip.absAngle;
          var dist =
            ((this.end.x - this.hip.x) ** 2 + (this.end.y - this.hip.y) ** 2) **
            0.5;
          var forwardness2 = dist * Math.cos(theta);
          var dF = this.forwardness - forwardness2;
          this.forwardness = forwardness2;
          if (dF * dF < 1) {
            this.step = 0;
            this.goalX = this.hip.x + (this.end.x - this.hip.x);
            this.goalY = this.hip.y + (this.end.y - this.hip.y);
          }
        }
      }
    }

    class Creature {
      constructor(x, y, angle, fAccel, fFric, fRes, fThresh, rAccel, rFric, rRes, rThresh) {
        this.x = x; 
        this.y = y;
        this.absAngle = angle; 
        this.fSpeed = 0; 
        this.fAccel = fAccel; 
        this.fFric = fFric; 
        this.fRes = fRes; 
        this.fThresh = fThresh; 
        this.rSpeed = 0; 
        this.rAccel = rAccel; 
        this.rFric = rFric; 
        this.rRes = rRes; 
        this.rThresh = rThresh; 
        this.children = [];
        this.systems = [];
      }
      follow(x, y) {
        var dist = ((this.x - x) ** 2 + (this.y - y) ** 2) ** 0.5;
        var angle = Math.atan2(y - this.y, x - this.x);
        var accel = this.fAccel;
        if (this.systems.length > 0) {
          var sum = 0;
          for (var i = 0; i < this.systems.length; i++) {
            sum += this.systems[i].step == 0;
          }
          accel *= sum / this.systems.length;
        }
        this.fSpeed += accel * (dist > this.fThresh);
        this.fSpeed *= 1 - this.fRes;
        this.speed = Math.max(0, this.fSpeed - this.fFric);
        var dif = this.absAngle - angle;
        dif -= 2 * Math.PI * Math.floor(dif / (2 * Math.PI) + 1 / 2);
        if (Math.abs(dif) > this.rThresh && dist > this.fThresh) {
          this.rSpeed -= this.rAccel * (2 * (dif > 0) - 1);
        }
        this.rSpeed *= 1 - this.rRes;
        if (Math.abs(this.rSpeed) > this.rFric) {
          this.rSpeed -= this.rFric * (2 * (this.rSpeed > 0) - 1);
        } else {
          this.rSpeed = 0;
        }
        this.absAngle += this.rSpeed;
        this.absAngle -= 2 * Math.PI * Math.floor(this.absAngle / (2 * Math.PI) + 1 / 2);
        this.x += this.speed * Math.cos(this.absAngle);
        this.y += this.speed * Math.sin(this.absAngle);
        this.absAngle += Math.PI;
        for (var i = 0; i < this.children.length; i++) {
          this.children[i].follow(true, true);
        }
        for (var i = 0; i < this.systems.length; i++) {
          this.systems[i].update(x, y);
        }
        this.absAngle -= Math.PI;
        this.draw(true);
      }
      draw(iter) {
        var r = 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, Math.PI / 4 + this.absAngle, 7 * Math.PI / 4 + this.absAngle);
        ctx.moveTo(this.x + r * Math.cos(7 * Math.PI / 4 + this.absAngle), this.y + r * Math.sin(7 * Math.PI / 4 + this.absAngle));
        ctx.lineTo(this.x + r * Math.cos(this.absAngle) * 2 ** 0.5, this.y + r * Math.sin(this.absAngle) * 2 ** 0.5);
        ctx.lineTo(this.x + r * Math.cos(Math.PI / 4 + this.absAngle), this.y + r * Math.sin(Math.PI / 4 + this.absAngle));
        ctx.stroke();
        if (iter) {
          for (var i = 0; i < this.children.length; i++) {
            this.children[i].draw(true);
          }
        }
      }
    }

    var currentQuestion = {};
    var targets = [];
    var score = 0;
    var wrongAnswers = 0;
    var currentScale = 1.0;
    var maxScale = 3.2;

    // Quản lý thời gian
    var timeLeft = 12.0;       // Thời gian đếm ngược mặc định: 12 giây cho mỗi câu
    var maxTimePerQuestion = 12.0;

    // Lưu trữ các kích thước ban đầu của Quái Vật để dãn nở dẻo dai
    var originalStats = {
      segments: [],
      systems: [],
      critter: {
        fAccel: 0, fFric: 0, fThresh: 0
      }
    };

    function saveOriginalLizardStats() {
      originalStats.segments = [];
      originalStats.systems = [];
      
      originalStats.critter.fAccel = critter.fAccel;
      originalStats.critter.fFric = critter.fFric;
      originalStats.critter.fThresh = critter.fThresh;

      function traverseAndSave(node) {
        if (node.isSegment) {
          originalStats.segments.push({ ref: node, size: node.size });
        }
        for (var i = 0; i < node.children.length; i++) {
          traverseAndSave(node.children[i]);
        }
      }
      traverseAndSave(critter);

      for (var i = 0; i < critter.systems.length; i++) {
        var sys = critter.systems[i];
        originalStats.systems.push({ ref: sys, reach: sys.reach, speed: sys.speed });
      }
    }

    function applyLizardScale(scale) {
      critter.fAccel = originalStats.critter.fAccel * scale;
      critter.fFric = originalStats.critter.fFric * scale;
      critter.fThresh = originalStats.critter.fThresh * scale;

      for (var i = 0; i < originalStats.segments.length; i++) {
        var item = originalStats.segments[i];
        item.ref.size = item.size * scale;
      }

      for (var i = 0; i < originalStats.systems.length; i++) {
        var item = originalStats.systems[i];
        item.ref.reach = item.reach * scale;
        item.ref.speed = item.speed * scale;
      }
    }

    function updateLivesUI() {
      var hearts = "";
      var remaining = 3 - wrongAnswers;
      for (var i = 0; i < 3; i++) {
        if (i < remaining) {
          hearts += "❤️";
        } else {
          hearts += "🖤";
        }
      }
      document.getElementById("lives").innerText = "Mạng: " + hearts;
    }

    function triggerGameOver() {
      clearInterval(window.gameInterval);
      playGameOverSFX();
      document.getElementById("final-score").innerText = "Điểm của bạn: " + score;
      document.getElementById("game-over-screen").style.display = "flex";
    }

    function generateQuestion() {
      var a = Math.floor(Math.random() * 9) + 2;
      var b = Math.floor(Math.random() * 9) + 2;
      var answer = a * b;
      
      document.getElementById("question").innerText = a + " x " + b + " = ?";
      
      // Reset lại thời gian khi ra câu hỏi mới
      timeLeft = maxTimePerQuestion;

      targets = [];
      var answersPool = [answer, answer + Math.floor(Math.random() * 5) + 1, answer - Math.floor(Math.random() * 5) - 1, answer + 10, answer - 5];
      answersPool = answersPool.filter((v, i, self) => v > 0 && self.indexOf(v) === i).slice(0, 3);
      
      if(answersPool.indexOf(answer) === -1) answersPool[0] = answer;
      answersPool.sort(() => Math.random() - 0.5);

      for (var i = 0; i < 3; i++) {
        targets.push({
          x: Math.random() * (canvas.width - 250) + 125,
          y: Math.random() * (canvas.height - 300) + 150,
          value: answersPool[i],
          isCorrect: answersPool[i] === answer,
          radius: 35
        });
      }
    }

    function checkCollision(critter) {
      for (var i = 0; i < targets.length; i++) {
        var t = targets[i];
        var dist = ((critter.x - t.x) ** 2 + (critter.y - t.y) ** 2) ** 0.5;
        if (dist < t.radius + 12) { 
          if (t.isCorrect) {
            score += 10;
            currentScale += 0.15; 
            if (currentScale > maxScale) currentScale = maxScale;
            applyLizardScale(currentScale);
            playCorrectSFX();
          } else {
            score = Math.max(0, score - 5);
            wrongAnswers++;
            updateLivesUI();
            playIncorrectSFX();

            if (wrongAnswers >= 3) {
              triggerGameOver();
              return;
            }
          }
          
          document.getElementById("score").innerText = "Điểm số: " + score;
          generateQuestion();
          break;
        }
      }
    }

    function drawTargets() {
      for (var i = 0; i < targets.length; i++) {
        var t = targets[i];
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
        
        ctx.fillStyle = "rgba(0, 255, 204, 0.08)";
        ctx.fill();
        ctx.strokeStyle = "#00ffcc";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(t.value, t.x, t.y);
      }
      ctx.lineWidth = 1; 
    }

    var critter;
    function setupLizard(size, legs, tail) {
      var s = size;
      critter = new Creature(
        window.innerWidth / 2,
        window.innerHeight / 2,
        0,
        s * 10,
        s * 2,
        0.5,
        16,
        0.5,
        0.085,
        0.5,
        0.3
      );
      var spinal = critter;
      
      // Neck
      for (var i = 0; i < 6; i++) {
        spinal = new Segment(spinal, s * 4, 0, 3.1415 * 2 / 3, 1.1);
        for (var ii = -1; ii <= 1; ii += 2) {
          var node = new Segment(spinal, s * 3, ii, 0.1, 2);
          for (var iii = 0; iii < 3; iii++) {
            node = new Segment(node, s * 0.1, -ii * 0.1, 0.1, 2);
          }
        }
      }
      // Torso and legs
      for (var i = 0; i < legs; i++) {
        if (i > 0) {
          for (var ii = 0; ii < 6; ii++) {
            spinal = new Segment(spinal, s * 4, 0, 1.571, 1.5);
            for (var iii = -1; iii <= 1; iii += 2) {
              var node = new Segment(spinal, s * 3, iii * 1.571, 0.1, 1.5);
              for (var iv = 0; iv < 3; iv++) {
                node = new Segment(node, s * 3, -iii * 0.3, 0.1, 2);
              }
            }
          }
        }
        for (var ii = -1; ii <= 1; ii += 2) {
          var node = new Segment(spinal, s * 12, ii * 0.785, 0, 8); 
          node = new Segment(node, s * 16, -ii * 0.785, 6.28, 1); 
          node = new Segment(node, s * 16, ii * 1.571, 3.1415, 2); 
          for (var iii = 0; iii < 4; iii++) {
            new Segment(node, s * 4, (iii / 3 - 0.5) * 1.571, 0.1, 4);
          }
          new LegSystem(node, 3, s * 12, critter, 4);
        }
      }
      // Tail
      for (var i = 0; i < tail; i++) {
        spinal = new Segment(spinal, s * 4, 0, 3.1415 * 2 / 3, 1.1);
        for (var ii = -1; ii <= 1; ii += 2) {
          var node = new Segment(spinal, s * 3, ii, 0.1, 2);
          for (var iii = 0; iii < 3; iii++) {
            node = new Segment(node, s * 3 * (tail - i) / tail, -ii * 0.1, 0.1, 2);
          }
        }
      }

      saveOriginalLizardStats();
      generateQuestion();

      if (window.gameInterval) clearInterval(window.gameInterval);
      window.gameInterval = setInterval(function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Quản lý đếm ngược (độ trễ 33ms tương đương 0.033 giây mỗi frame)
        timeLeft -= 0.033;
        if (timeLeft <= 0) {
          // Hết giờ: Bị tính là trả lời sai
          playIncorrectSFX();
          score = Math.max(0, score - 5);
          wrongAnswers++;
          updateLivesUI();
          document.getElementById("score").innerText = "Điểm số: " + score;
          
          if (wrongAnswers >= 3) {
            triggerGameOver();
            return;
          } else {
            generateQuestion();
          }
        }

        // Cập nhật thanh hiển thị thời gian
        var timePct = Math.max(0, (timeLeft / maxTimePerQuestion) * 100);
        var bar = document.getElementById("timer-bar");
        if (bar) {
          bar.style.width = timePct + "%";
          // Đổi màu thanh máu theo thời gian còn lại
          if (timePct > 50) {
            bar.style.background = "#00ffcc";
            bar.style.boxShadow = "0 0 8px #00ffcc";
          } else if (timePct > 20) {
            bar.style.background = "#ffd700";
            bar.style.boxShadow = "0 0 8px #ffd700";
          } else {
            bar.style.background = "#ff3333";
            bar.style.boxShadow = "0 0 8px #ff3333";
          }
        }

        drawTargets();
        checkCollision(critter);
        critter.follow(Input.mouse.x, Input.mouse.y);
      }, 33);
    }

    canvas.style.backgroundColor = "black";
    ctx.strokeStyle = "white";

    function resetGame() {
      score = 0;
      wrongAnswers = 0;
      currentScale = 1.0;
      segmentCount = 0;
      timeLeft = maxTimePerQuestion;
      
      document.getElementById("score").innerText = "Điểm số: 0";
      document.getElementById("game-over-screen").style.display = "none";
      updateLivesUI();

      var legNum = Math.floor(1 + Math.random() * 12);
      setupLizard(
        8 / Math.sqrt(legNum),
        legNum,
        Math.floor(4 + Math.random() * legNum * 8)
      );

      // Nếu người dùng đã mở nhạc, restart lại giai điệu
      if (audioEnabled) {
        startBGM();
      }
    }

    // Khởi chạy trò chơi lần đầu
    resetGame();
  </script>
</body>
